<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    padding:20px;
    height:100vh;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

h2{
    margin-bottom:15px;
    text-align:center;
}

canvas{
    border:1px solid #ccc;
    border-radius:10px;
    background:#fff;
    touch-action:none;
}

.controls{
    margin-top:15px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Поставьте подпись</h2>

<canvas id="signature" width="320" height="180"></canvas>

<div class="controls">
    <button id="clearBtn">Очистить</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();

const canvas = document.getElementById("signature");
const ctx = canvas.getContext("2d");

ctx.strokeStyle = "#000";
ctx.lineWidth = 2;
ctx.lineCap = "round";

let drawing = false;
let hasSignature = false;

const params = new URLSearchParams(window.location.search);
const documentId = params.get("doc") || null;

function getPosition(event){

    const rect = canvas.getBoundingClientRect();

    return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
    };
}

canvas.addEventListener("pointerdown",(event)=>{

    drawing = true;

    const pos = getPosition(event);

    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
});

canvas.addEventListener("pointermove",(event)=>{

    if(!drawing) return;

    const pos = getPosition(event);

    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();

    hasSignature = true;
});

canvas.addEventListener("pointerup",()=>{
    drawing = false;
});

canvas.addEventListener("pointerleave",()=>{
    drawing = false;
});

document.getElementById("clearBtn").addEventListener("click",()=>{

    ctx.clearRect(0,0,canvas.width,canvas.height);

    hasSignature = false;
});

tg.MainButton.setText("Подписать");
tg.MainButton.show();

tg.onEvent("mainButtonClicked",()=>{

    if(!hasSignature){
        tg.showAlert("Сначала поставьте подпись");
        return;
    }

    const signaturePng = canvas.toDataURL("image/png");

    const payload = {
        type: "signature",
        document_id: documentId,
        created_at: new Date().toISOString(),
        image: signaturePng
    };

    tg.sendData(JSON.stringify(payload));

    tg.close();
});

</script>

</body>
</html>
