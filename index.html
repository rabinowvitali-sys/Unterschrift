<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background: var(--tg-theme-bg-color, #f5f5f5); color: var(--tg-theme-text-color, #000); }
        canvas { background: #fff; border: 1px solid #ccc; border-radius: 12px; touch-action: none; cursor: crosshair; }
        #clear { margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); font-weight: bold; cursor: pointer; }
        #portal { margin-top: 20px; padding: 15px; font-weight: bold; text-align: center; cursor: pointer; border: 1px dashed #ccc; border-radius: 8px; width: 80%; background: var(--tg-theme-secondary-bg-color); }
    </style>
</head>
<body>

<canvas id="canvas" width="200" height="120"></canvas>
<button id="clear">Clear</button>
<div id="portal">Send</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const canvas = document.getElementById("canvas");
const portal = document.getElementById("portal");
const ctx = canvas.getContext("2d");
ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";

let drawing = false;
let signed = false;

function pos(e) {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
}

canvas.addEventListener("pointerdown", e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener("pointermove", e => { if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
canvas.addEventListener("pointerup", () => drawing = false);
canvas.addEventListener("pointerleave", () => drawing = false);

document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

portal.onclick = () => {
    if (!signed) {
        tg.showAlert("Sign required");
        return;
    }

    const data = canvas.toDataURL("image/png");
    tg.sendData(JSON.stringify({
        action: "submit",
        image: data,
        user_id: tg.initDataUnsafe?.user?.id
    }));
    
    portal.innerText = "Sent";
    setTimeout(() => tg.close(), 500);
};
</script>
</body>
</html>
