<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="canvas" width="200" height="120" style="border:1px solid #000; touch-action:none;"></canvas>
    <br>
    <button id="clear"></button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const userLang = tg.initDataUnsafe?.user?.language_code || 'en';
        const lang = userLang === 'ru' ? 
            { send: 'Отправить', clear: 'Очистить', err: 'Ошибка ID', api: 'Ошибка API: ', net: 'Ошибка сети: ' } : 
            { send: 'Send', clear: 'Clear', err: 'ID error', api: 'API error: ', net: 'Network error: ' };

        document.getElementById("clear").innerText = lang.clear;

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";

        let drawing = false;
        let signed = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener("pointerdown", e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener("pointermove", e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
        canvas.addEventListener("pointerup", () => drawing = false);

        document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

        tg.MainButton.setText(lang.send);
        tg.MainButton.show();

        tg.onEvent("mainButtonClicked", () => {
            if (!signed) return;
            
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                alert(lang.err);
                return;
            }

            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append("chat_id", userId);
                formData.append("photo", blob, "signature.jpg");

                fetch("https://api.telegram.org/bot8664770862:AAHwjp02mTm_icPTk_0zXbCBHDTH_gbQHUM/sendPhoto", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        tg.close();
                    } else {
                        alert(lang.api + data.description);
                    }
                })
                .catch(err => {
                    alert(lang.net + err.message);
                });
            }, "image/jpeg");
        });
    </script>
</body>
</html>
