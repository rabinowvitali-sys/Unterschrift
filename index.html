<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f5f5f5; }
    canvas { background:#fff; border:1px solid #ccc; border-radius:12px; touch-action:none; }
    button { margin-top:12px; padding:10px 16px; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<canvas id="canvas" width="200" height="120"></canvas>
<button id="clear">Очистить</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.strokeStyle = "#000";
ctx.lineWidth = 2;
ctx.lineCap = "round";

let drawing = false, signed = false;

function pos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener("pointerdown", e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener("pointermove", e => { if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
canvas.addEventListener("pointerup", () => drawing = false);

document.getElementById("clear").onclick = () => { ctx.clearRect(0,0, canvas.width, canvas.height); signed = false; };

tg.MainButton.setText("Отправить подпись");
tg.MainButton.show();

tg.onEvent("mainButtonClicked", () => {
    if(!signed) return tg.showAlert("Сначала поставьте подпись");

    canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = () => {
            // Отправляем как JSON объект
            fetch("ТВОЙ_WEBHOOK_URL_ЗДЕСЬ", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    signature: reader.result.split(',')[1] // Чистый Base64
                })
            })
            .then(res => res.ok ? tg.close() : tg.showAlert("Ошибка сервера"))
            .catch(err => tg.showAlert("Ошибка сети: " + err));
        };
        reader.readAsDataURL(blob);
    }, "image/jpeg", 0.7);
});
</script>
</body>
</html>
