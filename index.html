<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <canvas id="c" width="400" height="200" style="border:1px solid #000; touch-action:none;"></canvas>
    <button onclick="s()" style="width:100%; padding:20px; font-size:20px;">Send photo</button>
    <script>
        const c = document.getElementById('c'), x = c.getContext('2d');
        let d = false;
        c.onmousedown = () => d = true;
        c.onmouseup = () => { d = false; x.beginPath(); };
        c.onmousemove = (e) => { if(d) { x.lineTo(e.offsetX, e.offsetY); x.stroke(); }};
        function s() {
            Telegram.WebApp.sendData(c.toDataURL('image/png'));
            Telegram.WebApp.close();
        }
    </script>
</body>
</html>
