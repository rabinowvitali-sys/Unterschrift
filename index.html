<canvas id="signature-pad" width="400" height="200" style="border:1px solid #000;"></canvas>
<button id="save-btn">Отправить подпись</button>

<script>
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
let drawing = false;

// Логика рисования
canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;
canvas.onmousemove = (e) => {
    if (!drawing) return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
};

// Функция захвата картинки
document.getElementById('save-btn').onclick = () => {
    const dataURL = canvas.toDataURL('image/png'); // Вот она, твоя готовая картинка
    console.log("Картинка готова:", dataURL);
    // Сюда мы добавим fetch, когда настроим n8n
};
</script>
