<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
</head>
<body>
    <canvas id="canvas" width="200" height="120" style="border:1px solid #000; touch-action:none;"></canvas>
    <br>
    <button id="clear"></button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const lang = tg.initDataUnsafe.user?.language_code || 'en';
        document.getElementById("clear").innerText = "Clear (" + lang + ")";

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";

        let drawing = false;
        let signed = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener("pointerdown", e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener("pointermove", e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
        canvas.addEventListener("pointerup", () => drawing = false);

        document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

        tg.MainButton.setText("Sign (" + lang + ")");
        tg.MainButton.show();

        tg.onEvent("mainButtonClicked", () => {
            if (!signed) return;
            canvas.toBlob((blob) => {
                const reader = new FileReader();
                reader.onload = () => {
                    tg.sendData(LZString.compressToBase64(reader.result));
                };
                reader.readAsDataURL(blob);
            }, "image/jpeg", 0.5);
        });
    </script>
</body>
</html>
