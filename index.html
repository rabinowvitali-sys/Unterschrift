<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #fff; }
        canvas { width: 100%; height: 300px; border: 1px solid #000; touch-action: none; display: block; }
        button { margin-top: 10px; padding: 15px; width: 48%; }
    </style>
</head>
<body>
    <canvas id="s"></canvas>
    <button onclick="document.getElementById('s').getContext('2d').clearRect(0,0,1600,500)">Очистить</button>
    <button onclick="send()">Отправить</button>

    <script>
        const c = document.getElementById('s');
        const ctx = c.getContext('2d');
        c.width = 1600; c.height = 500;
        let p = false;

        const draw = (e) => {
            if (!p) return;
            const r = c.getBoundingClientRect();
            const x = ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) * (1600 / r.width);
            const y = ((e.touches ? e.touches[0].clientY : e.clientY) - r.top) * (500 / r.height);
            ctx.lineTo(x, y); ctx.stroke();
        };

        c.onmousedown = () => p = true;
        c.onmouseup = () => { p = false; ctx.beginPath(); };
        c.onmousemove = draw;
        c.ontouchstart = (e) => { e.preventDefault(); p = true; };
        c.ontouchend = () => { p = false; ctx.beginPath(); };
        c.ontouchmove = (e) => { e.preventDefault(); draw(e); };

        async function send() {
            c.toBlob(async (b) => {
                const fd = new FormData();
                fd.append('signature', b, 'signature.png');
                fd.append('chat_id', Telegram.WebApp.initDataUnsafe.user.id);
                await fetch('ТВОЙ_WEBHOOK_URL', { method: 'POST', body: fd });
                Telegram.WebApp.close();
            }, 'image/png');
        }
    </script>
</body>
</html>
