<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        canvas { background: #fff; border: 2px solid #ccc; border-radius: 8px; touch-action: none; width: 100%; max-width: 500px; height: 300px; }
        button { margin-top: 20px; width: 100%; max-width: 500px; padding: 15px; font-size: 18px; background: #2481cc; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <button onclick="send()">Отправить фото</button>

    <script>
        const c = document.getElementById('c'), x = c.getContext('2d');
        c.width = 800; c.height = 400;
        let d = false;
        
        const pos = (e) => {
            const r = c.getBoundingClientRect();
            const clX = e.touches ? e.touches[0].clientX : e.clientX;
            const clY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clX - r.left) * (800 / r.width), y: (clY - r.top) * (400 / r.height) };
        };

        c.onmousedown = (e) => { d = true; x.beginPath(); x.moveTo(pos(e).x, pos(e).y); };
        c.onmousemove = (e) => { if (d) { x.lineTo(pos(e).x, pos(e).y); x.stroke(); }};
        c.onmouseup = () => d = false;
        
        c.ontouchstart = (e) => { d = true; x.beginPath(); x.moveTo(pos(e).x, pos(e).y); };
        c.ontouchmove = (e) => { if (d) { x.lineTo(pos(e).x, pos(e).y); x.stroke(); e.preventDefault(); }};
        c.ontouchend = () => d = false;

        async function send() {
            c.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('file', blob, 'signature.png');
                fd.append('chat_id', Telegram.WebApp.initDataUnsafe.user.id);
                
                // Сюда вставь URL из ноды Webhook в n8n
                await fetch('ТВОЙ_WEBHOOK_URL_ИЗ_N8N', { method: 'POST', body: fd });
                
                Telegram.WebApp.close();
            }, 'image/png');
        }
    </script>
</body>
</html>
