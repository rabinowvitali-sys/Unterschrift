<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="canvas" width="300" height="150" style="border:1px solid #000; touch-action:none;"></canvas>
    <br>
    <button id="clear">Clear</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";

        let drawing = false;
        let signed = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener("pointerdown", e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener("pointermove", e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
        canvas.addEventListener("pointerup", () => drawing = false);

        document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

        tg.MainButton.setText("Sign");
        tg.MainButton.show();

        tg.onEvent("mainButtonClicked", () => {
            if (!signed) return;
            canvas.toBlob((blob) => {
                tg.shareMessage({ media: blob });
                tg.close();
            }, "image/jpeg", 0.7);
        });
    </script>
</body>
</html>
