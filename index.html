<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background: var(--tg-theme-bg-color, #f5f5f5); color: var(--tg-theme-text-color, #000); }
        canvas { background: #fff; border: 1px solid #ccc; border-radius: 12px; touch-action: none; cursor: crosshair; }
        button { margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="canvas" width="200" height="120"></canvas>
<button id="clear">Очистить</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.strokeStyle = "#000";
ctx.lineWidth = 2;
ctx.lineCap = "round";

let drawing = false;
let signed = false;

function pos(e) {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
}

canvas.addEventListener("pointerdown", e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener("pointermove", e => { if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
canvas.addEventListener("pointerup", () => drawing = false);
canvas.addEventListener("pointerleave", () => drawing = false);

document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

tg.MainButton.setText("Подписать");
tg.MainButton.show();

tg.onEvent("mainButtonClicked", () => {
    if (!signed) {
        tg.showAlert("Пожалуйста, поставьте подпись.");
        return;
    }

    // Показываем индикатор, блокируем кнопку
    tg.MainButton.showProgress();
    tg.MainButton.disable();

    // Сжимаем и отправляем
    const small = document.createElement("canvas");
    small.width = 100; small.height = 60;
    small.getContext("2d").drawImage(canvas, 0, 0, 100, 60);

    small.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = () => {
            const compressed = LZString.compressToBase64(reader.result);
            
            // Отправляем данные в N8N
            tg.sendData(compressed);
            
            // После успешной отправки закрываем приложение
            // Telegram сам обработает это событие
            tg.close();
        };
        reader.readAsDataURL(blob);
    }, "image/jpeg", 0.5);
});
</script>
</body>
</html>
