<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #333; cursor: crosshair; touch-action: none; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="signature-pad" width="300" height="150"></canvas>
<button id="save-btn">Отправить</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        ctx.stroke();
    }

    canvas.onmousedown = () => { drawing = true; ctx.beginPath(); };
    canvas.onmouseup = () => drawing = false;
    canvas.onmousemove = draw;

    document.getElementById('save-btn').onclick = () => {
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('initData', tg.initData);
            formData.append('file', blob, 'signature.png');

            try {
                const response = await fetch('ТВОЙ_WEBHOOK_URL_ИЗ_N8N', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    tg.close();
                } else {
                    alert('Ошибка отправки');
                }
            } catch (err) {
                alert('Нет связи с n8n');
            }
        }, 'image/png');
    };
</script>
</body>
</html>
