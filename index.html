<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
        canvas { border: 1px solid #ccc; touch-action: none; background: white; width: 90vw; height: 300px; }
        button { margin: 10px; padding: 10px 20px; }
    </style>
</head>
<body>
    <canvas id="sigCanvas"></canvas>
    <div>
        <button onclick="clearCanvas()">Очистить</button>
        <button onclick="sendSignature()">Отправить</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();

        const canvas = document.getElementById('sigCanvas');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';

        let painting = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.onmousedown = (e) => { painting = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
        canvas.onmousemove = (e) => { if (painting) { const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } };
        canvas.onmouseup = () => { painting = false; };
        
        canvas.ontouchstart = (e) => { painting = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
        canvas.ontouchmove = (e) => { if (painting) { const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } };
        canvas.ontouchend = () => { painting = false; };

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        async function sendSignature() {
            const token = '8664770862:AAHwjp02mTm_icPTk_0zXbCBHDTH_gbQHUM';
            const chatId = tg.initDataUnsafe.user?.id; // Берем ID прямо из контекста Telegram
            
            if (!chatId) { alert("Ошибка: не удалось получить ID пользователя"); return; }

            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'sig.png');
                const res = await fetch(https://api.telegram.org/bot${token}/sendPhoto, { method: 'POST', body: fd });
                if (res.ok) {
                    alert('Отправлено!');
                    tg.close(); // Закрываем окно после отправки
                }
            });
        }
    </script>
</body>
</html>
