<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #f5f5f5; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #fff; border: 1px solid #ccc; border-radius: 12px; touch-action: none; }
        button { margin-top: 12px; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>

<body>
    <canvas id="canvas" width="200" height="120"></canvas>
    <button id="clear">Clear</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const userLang = tg.initDataUnsafe.user?.language_code || 'en';
        const langName = new Intl.DisplayNames([userLang], { type: 'language' }).of(userLang);
        
        const btnText = Sign (${langName});
        const clearBtnText = Clear (${langName});

        document.getElementById("clear").innerText = clearBtnText;

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";

        let drawing = false;
        let signed = false;

        function pos(e) {
            const r = canvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        canvas.addEventListener("pointerdown", e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener("pointermove", e => { if (!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
        canvas.addEventListener("pointerup", () => drawing = false);
        canvas.addEventListener("pointerleave", () => drawing = false);

        document.getElementById("clear").onclick = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); signed = false; };

        tg.MainButton.setText(btnText);
        tg.MainButton.show();

        tg.onEvent("mainButtonClicked", () => {
            if (!signed) {
                tg.showAlert("Please sign");
                return;
            }

            const small = document.createElement("canvas");
            small.width = 100; small.height = 60;
            small.getContext("2d").drawImage(canvas, 0, 0, small.width, small.height);

            small.toBlob((blob) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const compressed = LZString.compressToBase64(reader.result);
                    tg.sendData(compressed);
                };
                reader.readAsDataURL(blob);
            }, "image/jpeg", 0.5);
        });
    </script>
</body>
</html>
