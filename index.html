<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 10px; background: #fff; touch-action: none; }
        #canvas { width: 100%; height: 300px; border: 1px solid #ccc; background: #fff; display: block; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; background: #2481cc; color: white; border-radius: 8px; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button onclick="send()">Отправить в чат</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 300;
        let drawing = false;

        const draw = (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * (800 / rect.width);
            const y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * (300 / rect.height);
            ctx.lineTo(x, y); ctx.stroke();
        };

        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = draw;
        canvas.ontouchstart = (e) => { drawing = true; };
        canvas.ontouchend = () => { drawing = false; ctx.beginPath(); };
        canvas.ontouchmove = draw;

        function send() {
            canvas.toBlob((blob) => {
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    // Telegram сам отправит это в чат боту
                    Telegram.WebApp.sendData(reader.result);
                    Telegram.WebApp.close();
                };
            }, 'image/png');
        }
    </script>
</body>
</html>
