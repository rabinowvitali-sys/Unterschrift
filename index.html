<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #eee; touch-action: none; }
canvas { background: #fff; border: 1px solid #000; touch-action: none; }
</style>
</head>
<body>
<canvas id="canvas" width="300" height="200"></canvas>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
ctx.lineWidth = 3;
ctx.lineCap = 'round';
ctx.strokeStyle = '#000';
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
canvas.addEventListener('pointerdown', (e) => {
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('pointermove', (e) => {
    if (!drawing) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
});
canvas.addEventListener('pointerup', () => drawing = false);
canvas.addEventListener('pointerleave', () => drawing = false);
tg.MainButton.setText("Отправить");
tg.MainButton.show();
tg.onEvent("mainButtonClicked", () => {
    canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = () => {
            const data = reader.result.split(',')[1];
            fetch("ВСТАВИТЬ_URL_WEBHOOK_N8N", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ signature: data })
            }).then(() => tg.close());
        };
        reader.readAsDataURL(blob);
    }, "image/jpeg", 0.5);
});
</script>
</body>
</html>
