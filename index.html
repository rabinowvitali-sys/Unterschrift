<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#f5f5f5}
        body{display:flex;flex-direction:column;align-items:center;justify-content:center}
        canvas{background:#fff;border:1px solid #ccc;border-radius:12px;touch-action:none}
    </style>
</head>
<body>
    <canvas id="canvas" width="200" height="120"></canvas>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";
        
        let drawing = false, signed = false;
        const pos = (e) => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };

        canvas.addEventListener("pointerdown", e => { drawing = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener("pointermove", e => { if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
        canvas.addEventListener("pointerup", () => drawing = false);

        tg.MainButton.setText("Отправить").show();

        tg.onEvent("mainButtonClicked", () => {
            if(!signed) return tg.showAlert("Поставьте подпись");

            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append("file", blob, "signature.jpg");
                
                fetch("ТВОЙ_WEBHOOK_URL", {
                    method: "POST",
                    body: formData
                }).then(() => tg.close());
            }, "image/jpeg", 0.9);
        });
    </script>
</body>
</html>
