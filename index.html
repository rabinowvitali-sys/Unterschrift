<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        canvas { background: #fff; border: 1px solid #ccc; touch-action: none; cursor: crosshair; width: 200px; height: 120px; }
        #clear { margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); cursor: pointer; }
    </style>
</head>
<body>

<canvas id="canvas" width="100" height="60"></canvas>
<button id="clear">Очистить</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.strokeStyle = "#000"; 
ctx.lineWidth = 1; 
ctx.lineCap = "round";

let drawing = false;
let signed = false;

function pos(e) {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - r.left) * (canvas.width / r.width), y: (clientY - r.top) * (canvas.height / r.height) };
}

canvas.addEventListener("pointerdown", e => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener("pointermove", e => { if(!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); signed = true; });
canvas.addEventListener("pointerup", () => drawing = false);

document.getElementById("clear").onclick = () => { 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    signed = false; 
    tg.MainButton.hide(); 
};

tg.MainButton.setText("ОТПРАВИТЬ");
tg.MainButton.onClick(() => {
    // Сжимаем в JPEG с качеством 0.1, размер будет мизерным
    tg.sendData(JSON.stringify({
        image: canvas.toDataURL("image/jpeg", 0.1)
    }));
});

canvas.addEventListener("pointerup", () => {
    if (signed) tg.MainButton.show();
});
</script>
</body>
</html>
