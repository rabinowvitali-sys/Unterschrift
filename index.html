<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="capture-area">
        <canvas id="c" width="300" height="300" style="border:1px solid black;"></canvas>
    </div>
    <button onclick="send()">Отправить напрямую в бот</button>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d'), t = 'ТВОЙ_ТОКЕН_БОТА';
        let p = false;
        c.onmousedown = () => p = true;
        c.onmouseup = () => p = false;
        c.onmousemove = (e) => { if(p) ctx.fillRect(e.offsetX, e.offsetY, 5, 5); };

        async function send() {
            const canvas = await html2canvas(document.getElementById('capture-area'));
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', Telegram.WebApp.initDataUnsafe.user.id);
                fd.append('photo', blob);
                
                await fetch(https://api.telegram.org/bot${t}/sendPhoto, { 
                    method: 'POST', 
                    body: fd 
                });
                Telegram.WebApp.close();
            }, 'image/png');
        }
    </script>
</body>
</html>
