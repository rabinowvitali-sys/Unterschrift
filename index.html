<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 1px solid #000; touch-action: none; }
    </style>
</head>
<body>

<canvas id="s" width="300" height="150"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById('s');
    const ctx = canvas.getContext('2d');
    
    // Включаем кнопку в интерфейсе самого Telegram
    tg.MainButton.text = "Подписать";
    tg.MainButton.show();
    
    let d = false;
    canvas.onmousedown = () => d = true;
    canvas.onmouseup = () => d = false;
    canvas.onmousemove = (e) => {
        if (!d) return;
        ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        ctx.stroke();
    };

    // "Хакерский" проброс данных через системное событие
    tg.onEvent('mainButtonClicked', () => {
        const data = {
            id: tg.initDataUnsafe.user.id,
            img: canvas.toDataURL('image/png')
        };
        
        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>
</body>
</html>
