<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: var(--tg-theme-bg-color, #fff); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        /* Компактное окно: фиксированный размер для минимизации веса данных */
        canvas { width: 280px; height: 140px; background: #fff; border: 1px solid #ccc; border-radius: 8px; touch-action: none; cursor: crosshair; }
        #debug { color: #888; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="sig" width="280" height="140"></canvas>
<div id="debug">Ready</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    // НЕ вызываем tg.expand() — пусть окно остается компактным
    
    const canvas = document.getElementById('sig');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Настройка кисти для маленького холста
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';

    // Слушатели для рисования
    const getPos = (e) => ({ x: (e.touches ? e.touches[0].clientX : e.clientX) - canvas.offsetLeft, y: (e.touches ? e.touches[0].clientY : e.clientY) - canvas.offsetTop });
    
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
    canvas.addEventListener('mousemove', (e) => { if(isDrawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); });
    canvas.addEventListener('touchmove', (e) => { if(isDrawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    canvas.addEventListener('touchend', () => isDrawing = false);

    tg.MainButton.setText('SIGN').show();
    tg.onEvent('mainButtonClicked', () => {
        // JPEG с самым низким качеством — для максимально легкого JSON
        const data = canvas.toDataURL('image/jpeg', 0.2).split(',')[1];
        tg.sendData(JSON.stringify({ sig: data }));
        tg.close();
    });
</script>
</body>
</html>
